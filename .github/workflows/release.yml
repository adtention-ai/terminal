name: release

# On a vX.Y.Z tag: build all platform binaries in a clean runner and publish a
# GitHub Release with binaries + SHA256SUMS. This mirrors ADtention Codex.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Tag must match Cargo.toml version
        run: |
          CARGO_V="v$(grep '^version[[:space:]]*=' client/Cargo.toml | head -1 \
            | sed -E 's/.*"([^"]+)".*/\1/')"
          if [ "$CARGO_V" != "$GITHUB_REF_NAME" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match Cargo.toml version $CARGO_V"
            exit 1
          fi

      - name: Build
        run: ./build.sh

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes "Release build from this tag. Verify a download with:
          \`shasum -a 256 -c SHA256SUMS\`" \
            bin/adtention-terminal-darwin-amd64 \
            bin/adtention-terminal-darwin-arm64 \
            bin/adtention-terminal-linux-amd64 \
            bin/adtention-terminal-linux-arm64 \
            bin/adtention-terminal-windows-amd64.exe \
            bin/SHA256SUMS
